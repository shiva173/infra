apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: backend-updates
  namespace: argocd
spec:
  namespace: argocd

  applicationRefs:
    - namePattern: backend
      images:
        - alias: backend
          imageName: docker.io/vumnikov/backend
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: regexp:^[0-9]+\.[0-9]+\.[0-9]+$
          manifestTargets:
            helm:
              name: deployment.image.repository
              tag: deployment.image.tag

  writeBackConfig:
    method: git:secret:argocd/argocd-image-updater-backend-git-writeback-creds
    gitConfig:
      branch: main
      repository: git@github.com:shiva173/infra.git
      writeBackTarget: helmvalues:./values.yaml