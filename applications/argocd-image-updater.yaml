apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: git@github.com:shiva173/infra.git
      targetRevision: main
      path: apps/argocd-image-updater/helm
      helm:
        valueFiles:
          - values.yaml
          - custom-values.yaml
    - repoURL: git@github.com:shiva173/infra.git
      targetRevision: main
      path: apps/argocd-image-updater/extra
      directory:
        recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
